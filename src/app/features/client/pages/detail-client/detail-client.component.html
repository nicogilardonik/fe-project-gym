<section
  class="bg-gradient-to-br from-blue-50 to-cyan-100 min-h-screen py-10 px-4"
>
  <div class="max-w-7xl mx-auto">
    
    <!-- Premium Header Section -->
    <div class="w-full overflow-hidden rounded-xl shadow-xl border border-gray-200 mb-6">
      <!-- Enhanced Header with animated gradient -->
      <div class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white p-6 border-b border-gray-200 relative overflow-hidden">
        
        <div class="relative flex items-center justify-between">
          <div class="flex items-center space-x-5">
            <!-- Avatar: real photo or fallback icon -->
            <ng-container *ngIf="selectedClient$ | async as client; else avatarFallback">
              <ng-container *ngIf="client?.avatarUrl; else avatarFallback">
                <div 
                  class="w-24 h-24 rounded-full overflow-hidden border-4 border-white border-opacity-60 shadow-xl shrink-0 bg-white bg-opacity-20 cursor-pointer hover:opacity-90 hover:scale-105 transition-all duration-200"
                  (click)="openAvatarModal(client.avatarUrl, client.name)"
                  title="Ver imagen en grande">
                  <img
                    [src]="client.avatarUrl"
                    [alt]="client.name || 'Avatar'"
                    class="w-full h-full object-cover"
                    loading="eager"
                  />
                </div>
              </ng-container>
            </ng-container>
            <ng-template #avatarFallback>
              <div class="w-24 h-24 bg-white bg-opacity-20 rounded-full flex items-center justify-center border-4 border-white border-opacity-40 shadow-xl backdrop-blur-sm shrink-0">
                <i class="ph-user text-white" style="font-size: 48px;"></i>
              </div>
            </ng-template>
            
            <div class="flex flex-col">
              <div class="flex items-center space-x-3 mb-1">
                <h3 class="font-bold text-white tracking-tight" style="font-size: 2.5rem; line-height: 1.2;">
                  Detalle del Cliente
                </h3>
              </div>

            </div>
          </div>
        </div>
        
      </div>
    </div>

    <div class="bg-white rounded-xl shadow-xl overflow-hidden">
      <mat-tab-group mat-align-tabs="center">
        <mat-tab label="Información general">
          <div class="p-4">
            <app-client-detail-info></app-client-detail-info>
          </div>
        </mat-tab>
        <mat-tab label="Rutina">
          <div class="p-4">
            <app-client-detail-routine></app-client-detail-routine>
          </div>
        </mat-tab>
        <mat-tab label="Plan">
          <div class="p-4">
            <app-client-detail-plan></app-client-detail-plan>
          </div>
        </mat-tab>
        <mat-tab label="Horarios">
          <div class="p-4">
            <app-client-detail-schedules></app-client-detail-schedules>
          </div>
        </mat-tab>
      </mat-tab-group>
    </div>
  </div>
</section>
